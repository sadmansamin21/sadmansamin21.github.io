<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATIVE PLAYMAKER | Sadman Samin</title>
   <meta name="description" content="Creative Playmaker - Download unique infographics, tifos, graffitis and more made by Sadman Samin for free.">
  <link rel="canonical" href="https://sadmansamin21.github.io/creative-playmaker.html" />
    <style>
        /* BASE & RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-transform: uppercase;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* MAXIMALIST MARQUEE */
        .marquee-container {
            background: #00f0ff;
            color: #000;
            padding: 10px 0;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: 2px solid #fff;
            font-weight: 900;
            letter-spacing: 2px;
        }
        .marquee {
            display: inline-block;
            animation: scroll 15s linear infinite;
            font-size: 1rem;
        }
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* HEADER */
        header {
            padding: 60px 20px;
            border-bottom: 1px solid #333;
            text-align: center;
            background: repeating-linear-gradient(
                45deg,
                #050505,
                #050505 10px,
                #0a0a0a 10px,
                #0a0a0a 20px
            );
        }
        h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -2px;
            margin-bottom: 10px;
            text-shadow: 4px 4px 0px #00f0ff, -2px -2px 0px #ff003c;
        }
        .subtitle {
            color: #888;
            font-size: 1.2rem;
            letter-spacing: 5px;
        }

        /* GRID SYSTEM */
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* PRODUCT CARDS */
        .card {
            background: #111;
            border: 1px solid #333;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            border-color: #00f0ff;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
            transform: translateY(-5px);
        }
        .image-container {
            width: 100%;
            height: 350px;
            overflow: hidden;
            position: relative;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(120%);
            transition: filter 0.5s ease, transform 0.5s ease;
        }
        .card:hover .image-container img {
            filter: grayscale(0%) contrast(110%);
            transform: scale(1.05);
        }
        
        .card-info {
            padding: 20px;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-title {
            font-weight: 800;
            font-size: 1.2rem;
        }
        .card-category {
            font-size: 0.7rem;
            color: #00f0ff;
            letter-spacing: 2px;
        }
        .btn-view {
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            padding: 8px 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .card:hover .btn-view {
            background: #00f0ff;
            color: #000;
            border-color: #00f0ff;
        }

        /* MODAL / MAGNIFIED PREVIEW */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: #0a0a0a;
            border: 2px solid #00f0ff;
            padding: 20px;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.1);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
        }
        .modal-close:hover {
            color: #ff003c;
        }
        .modal-image {
            max-height: 60vh;
            object-fit: contain;
            border: 1px solid #222;
        }
        .modal-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-download {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            text-align: center;
        }
        .btn-download:hover {
            background: #00f0ff;
            box-shadow: 0 0 15px #00f0ff;
        }

    </style>
</head>
<body>

    <!-- MARQUEE -->
    <div class="marquee-container">
        <div class="marquee">
            TIFOS // GRAFFITI // INFOGRAPHICS // ENTREPRENEUR // FOOTBALL // NO COMPROMISE // ELITE ASSETS // HIGH RES ONLY // TIFOS // GRAFFITI // INFOGRAPHICS // ENTREPRENEUR // FOOTBALL // NO COMPROMISE // ELITE ASSETS // HIGH RES ONLY //
        </div>
    </div>

    <!-- HEADER -->
    <header>
        <h1>CREATIVE<br>PLAYMAKER</h1>
        <div class="subtitle">TACTICAL CANVAS // RAW EXECUTION</div>
    </header>

    <!-- PRODUCT GRID -->
    <main class="store-grid" id="grid">
        <!-- Products will be injected via JavaScript -->
    </main>

    <!-- MODAL (PREVIEW & DOWNLOAD) -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" style="font-weight: 900; letter-spacing: 1px;">ASSET TITLE</h2>
                <button class="modal-close" id="close-modal">&times;</button>
            </div>
            <img src="" alt="Preview" class="modal-image" id="modal-image">
            <div class="modal-actions">
                <button class="btn-download" id="download-btn">DOWNLOAD HQ ASSET</button>
            </div>
        </div>
    </div>

    <script>
        // Sample Data for your store (Using high-quality placeholders for the vibe)
        const products = [
            { id: 1, title: "ULTRA TIFO 01", category: "FOOTBALL", img: "https://images.unsplash.com/photo-1518605368461-1ee71ab55339?q=80&w=800&auto=format&fit=crop" },
            { id: 2, title: "HUSTLE INFOGRAPHIC", category: "BUSINESS", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=800&auto=format&fit=crop" },
            { id: 3, title: "STREET VANDAL", category: "GRAFFITI", img: "https://images.unsplash.com/photo-1499781350541-7783f6c6a0c8?q=80&w=800&auto=format&fit=crop" },
            { id: 4, title: "TACTICAL PLAY", category: "FOOTBALL", img: "https://images.unsplash.com/photo-1508344928928-7165b67de128?q=80&w=800&auto=format&fit=crop" },
            { id: 5, title: "FOUNDER VIBES", category: "ENTREPRENEUR", img: "https://images.unsplash.com/photo-1552664730-d307ca884978?q=80&w=800&auto=format&fit=crop" },
            { id: 6, title: "CONCRETE JUNGLE", category: "GRAFFITI", img: "https://images.unsplash.com/photo-1517770413964-df8ca61194a6?q=80&w=800&auto=format&fit=crop" }
        ];

        const grid = document.getElementById('grid');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-image');
        const modalTitle = document.getElementById('modal-title');
        const closeBtn = document.getElementById('close-modal');
        const downloadBtn = document.getElementById('download-btn');

        let currentImageSrc = '';
        let currentTitle = '';

        // Inject products into the grid
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="image-container">
                    <img src="${product.img}" alt="${product.title}">
                </div>
                <div class="card-info">
                    <div>
                        <div class="card-category">${product.category}</div>
                        <div class="card-title">${product.title}</div>
                    </div>
                    <button class="btn-view">VIEW</button>
                </div>
            `;
            
            // Open Modal on click
            card.addEventListener('click', () => {
                modalImg.src = product.img;
                modalTitle.innerText = product.title;
                currentImageSrc = product.img;
                currentTitle = product.title;
                modal.classList.add('active');
            });

            grid.appendChild(card);
        });

        // Close Modal
        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        // Close Modal if clicking outside content
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        // Force Download Logic
        downloadBtn.addEventListener('click', async () => {
            downloadBtn.innerText = "DOWNLOADING...";
            try {
                const response = await fetch(currentImageSrc);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = currentTitle.replace(/\s+/g, '_') + '.jpg';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                setTimeout(() => downloadBtn.innerText = "DOWNLOAD HQ ASSET", 1000);
            } catch (error) {
                alert("Download blocked by cross-origin rules on placeholders. In a real environment, your images will download instantly.");
                downloadBtn.innerText = "DOWNLOAD HQ ASSET";
            }
        });
    </script>
</body>
</html>
